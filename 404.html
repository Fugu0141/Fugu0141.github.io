<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - ページが見つかりません</title>
  <style>
    :root {
      --main: #6f8cff;
      --sub: #b99cff;
      --text: #31415f;
      --card: rgba(255, 255, 255, 0.80);
      --border: rgba(120, 150, 255, 0.22);
      --shadow: rgba(88, 105, 155, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(172, 204, 255, 0.56), transparent 25%),
        radial-gradient(circle at 83% 17%, rgba(223, 190, 255, 0.52), transparent 28%),
        radial-gradient(circle at 50% 92%, rgba(176, 239, 255, 0.46), transparent 30%),
        linear-gradient(135deg, #f8fbff 0%, #fff7fd 100%);
    }

    .bubble {
      position: fixed;
      width: var(--size);
      height: var(--size);
      left: var(--left);
      top: var(--top);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(124, 153, 255, 0.18);
      box-shadow: inset 0 0 16px rgba(255, 255, 255, 0.9);
      animation: floaty var(--duration) ease-in-out infinite;
      opacity: 0.75;
      pointer-events: none;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) translateX(0) scale(1); }
      50% { transform: translateY(-20px) translateX(8px) scale(1.04); }
    }

    .wrap {
      width: min(760px, calc(100vw - 32px));
      padding: 34px 28px 30px;
      border-radius: 34px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow: 0 22px 60px var(--shadow);
      display: grid;
      justify-items: center;
      text-align: center;
      position: relative;
      isolation: isolate;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 2px dashed rgba(126, 151, 255, 0.16);
      z-index: -1;
    }

    .illust-box {
      position: relative;
      min-height: 320px;
      width: 100%;
      display: grid;
      place-items: center;
      margin-bottom: 6px;
    }

    .character {
      width: min(360px, 76vw);
      max-height: 470px;
      object-fit: contain;
      filter: drop-shadow(0 14px 20px rgba(77, 86, 136, 0.14));
      animation: pop 520ms cubic-bezier(.2,.9,.3,1.15), yurayura 4.8s ease-in-out infinite 520ms;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(14px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes yurayura {
      0%, 100% { transform: rotate(-1deg) translateY(0); }
      50% { transform: rotate(1deg) translateY(-8px); }
    }

    .question {
      position: absolute;
      color: var(--main);
      font-size: clamp(34px, 7vw, 76px);
      font-weight: 900;
      text-shadow: 0 4px 0 rgba(255, 255, 255, 0.85);
      opacity: 0.42;
      animation: poyon 2.8s ease-in-out infinite;
      user-select: none;
    }

    .question.q1 { left: 3%; top: 14%; animation-delay: 0.1s; }
    .question.q2 { right: 4%; top: 28%; animation-delay: 0.7s; }
    .question.q3 { left: 16%; bottom: 9%; animation-delay: 1.1s; }

    @keyframes poyon {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-10px) rotate(8deg); }
    }

    h1 {
      margin: 4px 0 6px;
      line-height: 1;
      font-size: clamp(76px, 14vw, 144px);
      letter-spacing: -0.08em;
      color: transparent;
      background: linear-gradient(135deg, var(--main), var(--sub));
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 12px 28px rgba(122, 143, 255, 0.18);
    }

    .message {
      margin: 0 0 22px;
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      font-weight: 850;
      font-size: 16px;
      color: #ffffff;
      text-decoration: none;
      background: linear-gradient(135deg, var(--main), var(--sub));
      box-shadow: 0 11px 25px rgba(112, 135, 255, 0.22);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(112, 135, 255, 0.24);
    }

    @media (max-width: 760px) {
      body { overflow: auto; padding: 18px 0; }
      .wrap { padding: 24px 18px; }
      .illust-box { min-height: 250px; }
      .character { width: min(300px, 82vw); }
      .message { margin-bottom: 18px; }
    }
  </style>
</head>
<body>
  <span class="bubble" style="--size: 74px; --left: 7%; --top: 12%; --duration: 6.8s;"></span>
  <span class="bubble" style="--size: 38px; --left: 86%; --top: 18%; --duration: 5.8s;"></span>
  <span class="bubble" style="--size: 96px; --left: 76%; --top: 72%; --duration: 8.2s;"></span>
  <span class="bubble" style="--size: 44px; --left: 16%; --top: 78%; --duration: 6.2s;"></span>

  <main class="wrap" aria-labelledby="page-title">
    <section class="illust-box" aria-label="ランダムに表示されるキャラクター">
      <span class="question q1">?</span>
      <span class="question q2">?</span>
      <span class="question q3">?</span>
      <img class="character" id="characterImage" src="" alt="" />
    </section>

    <h1 id="page-title">404</h1>
    <p class="message">ページが見つかりません</p>
    <a class="button" id="homeButton" href="/">Topへ戻る</a>
  </main>

  <script>
    // GitHub Pagesのユーザーサイトなら "/" のままでOKです。
    // プロジェクトサイトなら例: "/QR_stamp_rally/" のように変更してください。
    const SITE_HOME = "/";

    const characters = [
      {
        image: "image/torafugu-404.png",
        alt: "はてなマークに囲まれて考え込むとらふぐちゃん",
        main: "#5b83ff",
        sub: "#8fb7ff"
      },
      {
        image: "image/kurage-404.png",
        alt: "はてなマークに囲まれて不思議そうにしているくらげちゃん",
        main: "#9b8cff",
        sub: "#8edfff"
      }
    ];

    const picked = characters[Math.floor(Math.random() * characters.length)];
    document.documentElement.style.setProperty("--main", picked.main);
    document.documentElement.style.setProperty("--sub", picked.sub);
    document.getElementById("characterImage").src = picked.image;
    document.getElementById("characterImage").alt = picked.alt;
    document.getElementById("homeButton").href = SITE_HOME;
  </script>
</body>
</html>
