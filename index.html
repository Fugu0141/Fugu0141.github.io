<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ふぐ / Fugu</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #dff6ff, #f7fbff);
      color: #1f2a33;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .profile-card {
      background: white;
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 80, 120, 0.12);
      margin-bottom: 32px;
    }

    .icon {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #bdeeff;
      background: #eaf9ff;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 2rem;
    }

    .name-sub {
      color: #5c7b8a;
      margin-bottom: 20px;
    }

    .intro-box {
      background: #f3fbff;
      border-radius: 16px;
      padding: 18px;
      line-height: 1.8;
      text-align: left;
      max-width: 650px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 1.4rem;
      margin: 28px 0 16px;
      padding-left: 8px;
      border-left: 6px solid #6ed6ff;
    }

    .sns-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .sns-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0, 80, 120, 0.10);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .sns-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 32px rgba(0, 80, 120, 0.18);
    }

    .sns-name {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #0077aa;
    }

    .sns-description {
      line-height: 1.7;
      color: #40515c;
    }

    footer {
      text-align: center;
      color: #6b8794;
      margin-top: 40px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- 自己紹介部分 -->
    <section class="profile-card">
      <img src="https://fugu0141.github.io/image/oau1dk.jpg" alt="ふぐのアイコン" class="icon" />

      <h1>ふぐ</h1>
      <div class="name-sub">Fugu</div>

      <div class="intro-box">
         Web制作、プログラミング、Linux、Unityなど、気になったものをいろいろ触っています。<br>
        「挑戦」と「貢献」をモットーに、誰かの役に立てる技術者を目指しています。<br>
        （社会貢献の一環として個人で寄付も行っています）
      </div>
    </section>

    <!-- SNSアカウント紹介部分 -->
    <h2 class="section-title">SNS / Links</h2>

    <section class="sns-list">

      <a class="sns-card" href="https://x.com/Fugu014147" target="_blank" rel="noopener noreferrer">
        <div class="sns-name">X</div>
        <div class="sns-description">
          日常のことや、制作中のものについて投稿しています。
        </div>
      </a>

      <a class="sns-card" href="https://github.com/Fugu0141" target="_blank" rel="noopener noreferrer">
        <div class="sns-name">GitHub</div>
        <div class="sns-description">
          プログラミングやWeb制作などのリポジトリを置いています。
        </div>
      </a>

      <a class="sns-card" href="https://qiita.com/Fugu0141" target="_blank" rel="noopener noreferrer">
        <div class="sns-name">Qiita</div>
        <div class="sns-description">
          技術メモや学んだことをまとめています。<br>
          ※基本的に初心者向けの内容を書いています。
        </div>
      </a>


      <a class="sns-card" href="https://www.pixiv.net/users/97150843" target="_blank" rel="noopener noreferrer">
        <div class="sns-name">pixiv</div>
        <div class="sns-description">
          AIイラストを投稿しています。<br>
          ※気が向いた時だけしか動かしません。
        </div>
      </a>

      <!--
      <a class="sns-card" href="https://example.com" target="_blank" rel="noopener noreferrer">
        <div class="sns-name">Other</div>
        <div class="sns-description">
          その他の活動やリンクをまとめています。
        </div>
      </a>
        -->

    </section>

    <footer>
      © 2026 Fugu
    </footer>

  </main>
</body>
</html>
